# RL Controller Configuration for Adam SP
# Adam SP机器人ROS2控制器配置文件

# Model path (relative to project root)
# 模型路径（相对于项目根目录）
# 使用ONNX模型进行推理。如果指定了.pt文件，系统会查找对应的.onnx文件
model_pb_velocity_flat: "logs/rsl_rl/adam_sp_velocity/2026-02-11_14-07-24/policy.onnx"

# 观测方法：选择使用哪种观测构建策略
# TODO: 根据adam_sp训练时使用的观测方法设置
observation_method: "velocity_flat"

# Locomotion Run specific configuration (only used when observation_method="locomotion_run")
# Locomotion Run特定配置（仅在observation_method="locomotion_run"时使用）
velocity_flat:
  # Velocity commands [lin_vel_x, lin_vel_y, ang_vel_z] (m/s, m/s, rad/s)
  # 速度命令 [线速度x, 线速度y, 角速度z] (m/s, m/s, rad/s)
  # Default: [0.0, 0.0, 0.0] (stationary)
  # 默认: [0.0, 0.0, 0.0] (静止)
  # Can be set dynamically via ROS topic or strategy.set_velocity_commands()
  # 可以通过ROS话题或strategy.set_velocity_commands()动态设置
  velocity_commands:
    lin_vel_x: 0.0
    lin_vel_y: 0.0
    ang_vel_z: 0.0
  
  # Key body positions in base frame [18] (6 bodies * 3)
  # 关键身体部位在基座坐标系中的位置 [18] (6个身体部位 * 3)
  # Default: all zeros
  # 默认: 全零
  # Can be set dynamically via strategy.set_key_body_pos_b()
  # 可以通过strategy.set_key_body_pos_b()动态设置
